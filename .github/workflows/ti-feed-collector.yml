name: BreachForge TI Feed Collector

on:
  schedule:
    # Run every 6 hours
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser python-dateutil

      - name: Run feed collector
        run: |
          python .github/scripts/collect_feeds.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated JSON files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BreachForge TI Bot"
          git add breachforge/intel/data/
          git diff --staged --quiet || git commit -m "chore: auto-update TI feeds [$(date -u '+%Y-%m-%d %H:%M')] [skip ci]"
          git push
