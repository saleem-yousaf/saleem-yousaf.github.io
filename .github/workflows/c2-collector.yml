name: C2 collector

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull C2 indicators from abuse.ch
        env:
          THREATFOX_KEY: ${{ secrets.THREATFOX_KEY }}
          OUT_DIR: breachforge/intel/data
        run: node collector/breachforge-c2-collector.js

      - name: Commit refreshed feed if it changed
        run: |
          git config user.name "c2-collector"
          git config user.email "actions@users.noreply.github.com"
          git add breachforge/intel/data/c2_infrastructure.json
          git diff --staged --quiet || git commit -m "chore: refresh C2 infrastructure feed"
          git push
