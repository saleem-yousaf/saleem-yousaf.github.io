name: Update TI Portal Data

on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours
  workflow_dispatch:          # adds the manual "Run workflow" button

permissions:
  contents: write             # needed so the job can commit the JSON back to the repo

concurrency:
  group: update-ti-portal
  cancel-in-progress: false

jobs:
  update-osint-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # Node 20 has fetch() built in; script uses https module

      - name: Install dependencies (only if a package.json exists)
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: Ensure the data directory exists
        run: mkdir -p breachforge/intel/data

      - name: Fetch OSINT data
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSE_CH_AUTH_KEY: ${{ secrets.ABUSE_CH_AUTH_KEY }}
        run: |
          if [ -f .github/scripts/fetch-osint-data.js ]; then
            echo "Running .github/scripts/fetch-osint-data.js"
            node .github/scripts/fetch-osint-data.js
          elif [ -f scripts/fetch-osint-data.js ]; then
            echo "Running scripts/fetch-osint-data.js"
            node scripts/fetch-osint-data.js
          else
            echo "ERROR: fetch-osint-data.js not found in .github/scripts/ or scripts/" >&2
            exit 1
          fi

      - name: Show what was written (for log visibility)
        run: ls -la breachforge/intel/data || echo "data directory is empty"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add breachforge/intel/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update TI Portal OSINT data [skip ci]"
            git push
          fi
