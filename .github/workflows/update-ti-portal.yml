name: Update TI Portal Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-osint-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch OSINT data
        run: node .github/scripts/fetch-osint-data.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "TI Bot"
          git add breachforge/intel/data/
          git commit -m "Update OSINT data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push
