<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BreachForge BAS Simulation v5.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090d;--surface:#0c1018;--card:#101520;--border:#1c2535;--teal:#00d4ff;--green:#00e87a;--text:#dde4ef;--grey:#55677a;--amber:#ffaa00;--red:#ff3355}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface);border-radius:2px}

.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:13px;font-weight:900;color:var(--teal);letter-spacing:.1em}
.sidebar-nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:2px 0;border-radius:4px;cursor:pointer;font-size:11px;color:var(--grey);transition:all .15s;border:1px solid transparent;text-decoration:none}
.nav-item:hover{background:rgba(0,212,255,.05);color:var(--text)}
.nav-item.active{background:rgba(0,212,255,.1);color:var(--teal);border-color:rgba(0,212,255,.2)}
.nav-section-label{font-size:9px;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;padding:8px 12px;margin-top:8px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:9px;color:var(--grey)}

.main{flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(7,9,13,.9);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:12px;font-weight:700;color:var(--text)}
.topbar-subtitle{font-size:10px;color:var(--grey);margin-top:2px}
.topbar-actions{display:flex;gap:8px}
.btn{padding:6px 12px;border-radius:4px;font-size:11px;border:none;cursor:pointer;transition:all .15s;font-weight:600}
.btn-primary{background:var(--teal);color:var(--bg)}
.btn-primary:hover{background:#00e8ff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}

.content{flex:1;overflow-y:auto;padding:24px}
.section{display:none}
.section.active{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.role-banner{background:rgba(0,212,255,.1);border-left:3px solid var(--teal);padding:12px 16px;margin-bottom:20px;border-radius:4px;font-size:11px;color:var(--grey)}
.role-badge{display:inline-block;background:rgba(0,212,255,.2);color:var(--teal);padding:2px 8px;border-radius:3px;font-weight:600;margin-left:8px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
.stat-value{font-size:18px;font-weight:700;color:var(--teal);margin-bottom:4px}
.stat-label{font-size:10px;color:var(--grey);text-transform:uppercase}

.report-persona-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;color:var(--grey);transition:all .15s}
.tab:hover{border-color:var(--teal)}
.tab.active{background:rgba(0,212,255,.1);border-color:var(--teal);color:var(--teal)}
.tab.role-match::after{content:'✓';margin-left:4px;color:var(--green)}

.report-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.report-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.report-title{font-size:13px;font-weight:700;color:var(--text)}
.report-audience{font-size:10px;color:var(--grey);margin-top:2px}
.report-format{display:inline-block;background:rgba(0,212,255,.1);color:var(--teal);padding:2px 6px;border-radius:2px;font-size:9px;font-weight:600}
.role-match-badge{display:inline-block;background:rgba(0,232,122,.1);color:var(--green);padding:2px 6px;border-radius:2px;font-size:9px;font-weight:600;margin-left:8px}
.report-description{font-size:11px;color:var(--grey);margin:8px 0;line-height:1.5}
.report-includes{font-size:10px;color:var(--grey);margin:8px 0}
.report-includes ul{margin-left:16px;margin-top:4px}
.report-includes li{margin:2px 0}
.report-preview{background:var(--surface);border:1px dashed var(--border);border-radius:4px;padding:12px;margin:12px 0;font-size:10px;color:var(--grey);max-height:120px;overflow-y:auto}
.report-actions{display:flex;gap:8px;margin-top:12px}
.report-actions button{flex:1}

.download-state{display:none;text-align:center;padding:20px}
.download-state.active{display:block}
.download-state.done{background:rgba(0,232,122,.05);border:1px solid rgba(0,232,122,.3);border-radius:4px}
.download-state.done .check-icon{color:var(--green);font-size:24px;margin-bottom:8px}
.download-state a{color:var(--teal);text-decoration:none;font-weight:600}

@media(max-width:768px){.sidebar{width:100%;height:auto}.main{flex-direction:column}.content{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
const ROLES = ["CISO / CIO", "SOC Analyst", "Architect", "PM", "Developer", ""];
const STAT_SETS = {
  "CISO / CIO": ["Exposure Score", "Detection Coverage", "Critical Gaps", "MTTD"],
  "SOC Analyst": ["Detection Coverage", "MTTD", "Critical Gaps", "Exposure Score"],
  "Architect": ["Critical Gaps", "Exposure Score", "Detection Coverage", "MTTD"],
  "PM": ["Critical Gaps", "Detection Coverage", "Exposure Score", "MTTD"],
  "Developer": ["Critical Gaps", "Detection Coverage", "Exposure Score", "MTTD"],
  "": ["Exposure Score", "Detection Coverage", "Critical Gaps", "MTTD"]
};

const ROLE_REPORT = {
  "CISO / CIO": "exec",
  "SOC Analyst": "mitre",
  "Architect": "full",
  "PM": "roadmap",
  "Developer": "full"
};

const REPORTS = {
  exec: {
    icon: "📊",
    title: "Executive Risk Summary",
    audience: "CISO / Board",
    format: "Word Document",
    description: "High-level risk exposure, detection coverage, MTTD, top 3 gaps, compliance summary, and recommended next steps.",
    includes: [
      "Exposure Score with historical trend",
      "Detection Coverage by ATT&CK tactic",
      "Mean Time To Detect (MTTD) across all scenarios",
      "Top 3 critical gaps",
      "Compliance impact assessment",
      "Board-ready executive summary"
    ]
  },
  mitre: {
    icon: "🎯",
    title: "SOC Technical Findings",
    audience: "SOC Analyst",
    format: "Word Document",
    description: "Detailed event log, detections fired vs missed, gap analysis per phase, MTTD breakdown, and SIEM tuning recommendations.",
    includes: [
      "Simulated attack event log with detection status",
      "Detections fired vs missed by technique",
      "Gap analysis per kill chain phase",
      "MTTD breakdown by attack phase",
      "SIEM tuning recommendations",
      "SPL and KQL detection rules for gaps"
    ]
  },
  full: {
    icon: "🏗",
    title: "Control Gap Analysis",
    audience: "Architect",
    format: "Word Document",
    description: "Attack path analysis, control bypasses, architecture recommendations, ATT&CK heatmap, and remedi details.",
    includes: [
      "Attack path visualization",
      "Control bypass analysis by technique",
      "Architecture recommendations",
      "ATT&CK Enterprise heatmap of covered techniques",
      "Detection rule coverage matrix",
      "Remediation sequencing and effort estimate"
    ]
  },
  roadmap: {
    icon: "📋",
    title: "Remediation Backlog",
    audience: "PM",
    format: "Word Document",
    description: "Sprint work items, priority, effort estimate, owner, risk reduction, and 30-60-90 day plan.",
    includes: [
      "Prioritised work items",
      "Effort estimate (story points)",
      "Assigned owner",
      "Risk reduction impact",
      "Dependency mapping",
      "30-60-90 day implementation plan"
    ]
  }
};

let state = {
  currentPage: "overview",
  role: "CISO / CIO",
  reportDone: false,
  downloadFormat: null,
  prevRole: "CISO / CIO"
};

function render() {
  const app = document.getElementById("app");
  const roleReport = ROLE_REPORT[state.role] || null;
  
  app.innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">BREACHFORGE</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Platform</div>
          <a class="nav-item ${state.currentPage==='overview'?'active':''}" onclick="navigate('overview')">Overview</a>
          <a class="nav-item ${state.currentPage==='simulation'?'active':''}" onclick="navigate('simulation')">Simulation</a>
          <a class="nav-item ${state.currentPage==='detection'?'active':''}" onclick="navigate('detection')">Detection Rules</a>
          <a class="nav-item ${state.currentPage==='reports'?'active':''}" onclick="navigate('reports')">Reports</a>
        </nav>
        <div class="sidebar-footer">v5.2 Role-Threaded Reporting</div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <div class="topbar-title">BreachForge BAS Simulation</div>
            <div class="topbar-subtitle">${state.currentPage.charAt(0).toUpperCase() + state.currentPage.slice(1)} ${state.role ? '· ' + state.role : ''}</div>
          </div>
          <div class="topbar-actions">
            <select onchange="setRole(this.value)" style="padding:6px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer">
              ${ROLES.map(r => `<option value="${r}" ${state.role===r?'selected':''}>${r||'None'}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="content">
          ${state.currentPage==='overview'?renderOverview():''}
          ${state.currentPage==='simulation'?renderSimulation():''}
          ${state.currentPage==='detection'?renderDetection():''}
          ${state.currentPage==='reports'?renderReports():''}
        </div>
      </main>
    </div>
  `;
}

function renderOverview() {
  const statOrder = STAT_SETS[state.role] || STAT_SETS[""];
  return `
    <div class="section active">
      <h2 class="card-title">Overview</h2>
      <div class="stats-grid">
        ${statOrder.map(stat => `<div class="stat-card"><div class="stat-value">92%</div><div class="stat-label">${stat}</div></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">S1-S10 Scenario Status</div>
        <div style="font-size:11px;color:var(--grey)">All 10 scenarios live. 154 ATT&CK techniques. Role ordering: ${state.role||'Default'}</div>
      </div>
    </div>
  `;
}

function renderSimulation() {
  return `<div class="section active"><div class="card"><div class="card-title">BAS Simulation</div><p style="font-size:11px;color:var(--grey)">Simulation scenarios and kill chain data</p></div></div>`;
}

function renderDetection() {
  return `<div class="section active"><div class="card"><div class="card-title">Detection Rules</div><p style="font-size:11px;color:var(--grey)">91 detection rules across 91 unique ATT&CK techniques</p></div></div>`;
}

function renderReports() {
  const roleReport = ROLE_REPORT[state.role] || null;
  
  return `
    <div class="section active">
      ${state.role ? `<div class="role-banner">Role selected: <strong>${state.role}</strong><span class="role-badge">${roleReport ? 'Pre-selected: ' + REPORTS[roleReport].title : 'No pre-selection'}</span></div>` : ''}
      
      <div class="report-persona-tabs">
        ${Object.entries(REPORTS).map(([key, report]) => {
          const isMatch = roleReport === key;
          return `<div class="tab ${isMatch?'active role-match':''}" onclick="setReportTab('${key}')">${report.icon} ${report.audience}</div>`;
        }).join('')}
      </div>

      <div>
        ${Object.entries(REPORTS).map(([key, report]) => {
          const isMatch = roleReport === key;
          return `
            <div class="report-card">
              <div class="report-header">
                <div>
                  <div class="report-title">${report.icon} ${report.title}</div>
                  <div class="report-audience">${report.audience}</div>
                  <span class="report-format">${report.format}</span>
                  ${isMatch ? '<span class="role-match-badge">Role match</span>' : ''}
                </div>
              </div>
              <div class="report-description">${report.description}</div>
              <div class="report-includes">
                <strong>What's included:</strong>
                <ul>${report.includes.map(item => `<li>${item}</li>`).join('')}</ul>
              </div>
              <div class="report-preview">
                <strong>Preview:</strong> [Report content would appear here]
              </div>
              <div class="report-actions">
                <button class="btn btn-primary" onclick="generateReport('${key}')">Generate Report</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      ${state.reportDone ? `
        <div class="download-state active done">
          <div class="check-icon">✓</div>
          <div style="font-size:12px;color:var(--green);margin-bottom:8px">Report generated successfully</div>
          <a href="#" onclick="downloadReport(event)">Download Word Document</a>
        </div>
      ` : ''}
    </div>
  `;
}

function navigate(page) {
  state.currentPage = page;
  render();
}

function setRole(role) {
  state.prevRole = state.role;
  state.role = role;
  render();
}

function setReportTab(reportKey) {
  // Tab switching for UI — pre-selection updates automatically
  render();
}

function generateReport(reportKey) {
  const report = REPORTS[reportKey];
  state.reportDone = true;
  state.downloadFormat = reportKey;
  
  // Trigger download after animation
  setTimeout(() => {
    downloadReportFile(reportKey, report);
  }, 500);
  
  render();
}

function downloadReport(e) {
  e.preventDefault();
  if (state.downloadFormat) {
    downloadReportFile(state.downloadFormat, REPORTS[state.downloadFormat]);
  }
}

function downloadReportFile(reportKey, report) {
  // Generate a simple Word document content (base64 encoded minimal docx)
  // In production this would generate a proper docx with content
  
  const docContent = `
    BreachForge Report: ${report.title}
    Audience: ${report.audience}
    Format: ${report.format}
    
    Description:
    ${report.description}
    
    Includes:
    ${report.includes.map((item, i) => `${i+1}. ${item}`).join('\n')}
    
    Generated: ${new Date().toISOString()}
  `;
  
  // Create a blob and download
  const blob = new Blob([docContent], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `BreachForge-Report-${reportKey}-${Date.now()}.docx`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

window.navigate = navigate;
window.setRole = setRole;
window.setReportTab = setReportTab;
window.generateReport = generateReport;
window.downloadReport = downloadReport;

render();
</script>
</body>
</html>
