function AttackPath({sc,progress=0}){
  const W=940,H=380;
  const activeEdges=Math.round((progress/100)*sc.edges.length);
  const activeNode=Math.round((progress/100)*(sc.nodes.length-1));
  const getN=id=>sc.nodes.find(n=>n.id===id);
  return <div style={{background:"#050810",border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
    <div style={{padding:"8px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
      <span style={{fontSize:9,letterSpacing:".12em",color:C.dim}}>ATTACK PATH VISUALISATION</span>
      <span style={{fontSize:9,color:progress>0&&progress<100?C.amber:progress===100?C.green:C.dim}}>{progress===100?"COMPLETE":progress>0?"LIVE":"READY"}</span>
    </div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",maxHeight:280}}>
      <defs>
        <marker id="ah" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill={C.dim+"88"}/></marker>
        <marker id="ahl" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill={C.red}/></marker>
        <filter id="ng"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {sc.edges.map((e,i)=>{
        const f=getN(e.f),t=getN(e.t);if(!f||!t)return null;
        const live=i<activeEdges,fx=f.x+52,fy=f.y,tx=t.x-52,ty=t.y,cy=(fy+ty)/2-28;
        return <g key={i}>
          <path d={`M${fx},${fy} Q${(fx+tx)/2},${cy} ${tx},${ty}`} stroke={live?C.red:C.border+"88"} strokeWidth={live?2:1.5} fill="none" markerEnd={live?"url(#ahl)":"url(#ah)"} strokeDasharray={live?"none":"5 3"} opacity={live?1:.5}/>
          <text x={(fx+tx)/2} y={cy-5} textAnchor="middle" fontSize="8" fill={live?C.amber:C.muted} fontFamily="JetBrains Mono,monospace">{e.lbl}</text>
        </g>;
      })}
      {sc.nodes.map((n,i)=>{
        const col=NODE_COLOR[n.type]||C.dim,active=i===activeNode&&progress>0&&progress<100;
        return <g key={n.id} filter={active?"url(#ng)":""}>
          <rect x={n.x-52} y={n.y-28} width={104} height={56} rx={5} fill={active?`${col}22`:`${col}0d`} stroke={active?col:`${col}44`} strokeWidth={active?2:1}/>
          <text x={n.x} y={n.y-10} textAnchor="middle" fontSize="15" fill={col} fontFamily="JetBrains Mono,monospace">{NODE_ICON[n.type]||"●"}</text>
          {n.lbl.split("\n").map((line,li)=><text key={li} x={n.x} y={n.y+(li===0?8:20)} textAnchor="middle" fontSize="8.5" fill={active?C.text:C.dim} fontFamily="JetBrains Mono,monospace">{line}</text>)}
        </g>;
      })}
    </svg>
    <div style={{padding:"8px 16px",borderTop:`1px solid ${C.border}`,display:"flex",gap:16,flexWrap:"wrap"}}>
      {[["actor","Threat Actor"],["endpoint","Endpoint"],["dc","Domain Controller"],["data","Data Store"],["impact","Impact"],["control","Control"]].map(([t,l])=>(
        <div key={t} style={{display:"flex",alignItems:"center",gap:5,fontSize:9,color:C.dim}}>
          <span style={{color:NODE_COLOR[t]||C.dim,fontSize:11}}>{NODE_ICON[t]||"●"}</span>{l}
        </div>
      ))}
    </div>
  </div>;
}

function SimRunner({tiPick,clearTiPick}={}){
  const {recs:tiRecs}=useTIData();

  const [sel,setSel]=useState(null);
  const [run,setRun]=useState(false);
  const [step,setStep]=useState(0);
  const [done,setDone]=useState(false);
  const [role,setRole]=useState(null);
  useEffect(()=>{if(tiPick){setSel(tiPick);setRun(false);setStep(0);setDone(false);if(clearTiPick)clearTiPick();}},[tiPick]);
  const [tab,setTab]=useState("path");
  const ref=useRef();
  function pick(s){setSel(s);setRun(false);setStep(0);setDone(false);}
  function start(){if(!sel)return;setRun(true);setStep(0);setDone(false);let i=0;ref.current=setInterval(()=>{i++;setStep(i);if(i>=sel.steps.length){clearInterval(ref.current);setRun(false);setDone(true);}},1100);}
  function reset(){clearInterval(ref.current);setRun(false);setStep(0);setDone(false);}
  const pct=sel?Math.round((step/sel.steps.length)*100):0;
  const chainLit=sel?Math.floor((step/sel.steps.length)*(sel.chain.length-1)):0;
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
      {SCENARIOS.map(sc=><div key={sc.id} onClick={()=>pick(sc)} style={{...card(),cursor:"pointer",border:`1px solid ${sel?.id===sc.id?(CAT_COL[sc.cat]||C.accent)+"80":C.border}`,background:sel?.id===sc.id?`${CAT_COL[sc.cat]||C.accent}08`:C.card,transition:"border-color .15s,background .15s",position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><Bdg v={sc.cat} c={CAT_COL[sc.cat]||C.dim}/><Sev v={sc.sev}/></div>
        <div style={{fontSize:12,fontWeight:700,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
              {sc.name}
              {tiMap[sc.id]&&<span style={{fontSize:7,fontWeight:700,color:tiMap[sc.id].urgency.toLowerCase()==="critical"?C.red:tiMap[sc.id].urgency.toLowerCase()==="high"?C.amber:C.accent,background:tiMap[sc.id].urgency.toLowerCase()==="critical"?C.red+"22":C.amber+"22",padding:"1px 6px",borderRadius:3,whiteSpace:"nowrap"}}>{"▲ "+tiMap[sc.id].urgency}</span>}
            </div>
        <div style={{fontSize:9,color:C.dim,lineHeight:1.6,marginBottom:10}}>{sc.desc}</div>
        <div style={{fontSize:9,color:C.muted}}>{sc.ttps.length} TTPs · {sc.dur}</div>
      </div>)}
    </div>
    {sel&&<div className="fadein" style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{...card(),display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:13,fontWeight:700}}>{sel.name}</div><div style={{fontSize:9,color:C.dim,marginTop:3}}>{sel.tactics.join(" → ")} · {sel.steps.length} steps</div></div>
        <div style={{display:"flex",gap:8}}>
          {!run&&!done&&<button style={BTN(C.green)} onClick={start}>▶ Execute Simulation</button>}
          {run&&<button style={BTN(C.amber)} disabled>⟳ Running…</button>}
          {done&&<button style={BTN(C.accent)} onClick={()=>pick(sel)}>↺ Re-run</button>}
          <button style={BTN(C.dim,true)} onClick={reset}>✕</button>
        </div>
      </div>
      {(run||done)&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:9,color:C.dim}}>Simulation progress</span><span style={{fontSize:9,color:C.accent}}>{pct}%</span></div><Bar p={pct} c={done?C.green:C.accent} h={6}/></div>}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`}}>
        {["path","killchain","events","ttps"].map(t=><button key={t} onClick={()=>setTab(t)} style={{background:"transparent",border:"none",borderBottom:`2px solid ${tab===t?C.accent:"transparent"}`,color:tab===t?C.accent:C.dim,padding:"9px 18px",fontSize:10,letterSpacing:".07em",textTransform:"uppercase"}}>{({path:"Attack Path",killchain:"Kill Chain",events:"Event Log",ttps:"TTPs"})[t]}</button>)}

      {tab==="path"&&<AttackPath sc={sel} progress={pct}/>}

      {tab==="events"&&<div style={card()}><div style={{display:"flex",flexDirection:"column",gap:6}}>
        {sel.steps.map((s,i)=>{const fired=i<step,active=i===step&&run,sc2={INFO:C.accent,WARN:C.amber,CRIT:C.red}[s.sev];return <div key={i} style={{display:"flex",gap:10,padding:"8px 12px",background:active?`${C.accent}0a`:fired?`${C.green}06`:"transparent",border:`1px solid ${active?C.accent+"44":fired?C.green+"1a":C.border+"44"}`,borderRadius:4,opacity:fired||active?1:.3,transition:"all .3s"}}>
          <span style={{fontSize:9,color:C.dim,flexShrink:0,width:44}}>{s.t}</span>
          <span style={bdg(sc2)}>{s.sev}</span>

        </div>;})}
      </div></div>}
      {tab==="ttps"&&<div style={card()}><table style={{width:"100%",borderCollapse:"collapse"}}>

        </tbody>
      </table></div>}
      {done&&<div className="fadein" style={{padding:16,background:`${C.green}08`,border:`1px solid ${C.green}30`,borderRadius:6}}>
        <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:12}}>Simulation Complete</div>
        <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
          {[["Detection Rate","75%",C.green],["Controls Fired",`${Math.round(sel.steps.length*.75)}/${sel.steps.length}`,C.accent],["Mean Time to Detect","22m",C.amber],["Gaps Found","3",C.red],["TTPs Tested",sel.ttps.length,C.purple]].map(([l,v,c])=><div key={l}><div style={{fontSize:9,color:C.dim}}>{l}</div><div style={{fontSize:20,fontWeight:700,color:c,marginTop:2}}>{v}</div></div>)}

    </div>}

function useScenarioDrafts(){
  const [drafts,setDrafts]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch('/breachforge/intel/data/emerging_scenarios.json?v='+Date.now())
      .then(r=>r.json())
      .then(d=>{setDrafts(d.drafts||[]);setLoading(false);})
      .catch(()=>{setDrafts([]);setLoading(false);});
  },[]);
  return {drafts,loading};
}


function ScenarioDraftPanel(){
  const {drafts,loading}=useScenarioDrafts();
  const [sel,setSel]=useState(null);
  const [copied,setCopied]=useState(false);
  const [approved,setApproved]=useState([]);

  if(loading)return <div style={{padding:16,color:C.dim,fontSize:11}}>Loading draft scenarios...</div>;
  if(!drafts||drafts.length===0)return null;

  const pending=drafts.filter(d=>d.status==="draft"&&!approved.includes(d.id));
  if(pending.length===0)return null;

  const sevCol={Critical:C.red,High:C.amber,Medium:C.accent};

  function copyJSON(d){
    const out=JSON.stringify(d,null,2);
    navigator.clipboard.writeText(out).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  return <div style={{marginTop:16,border:`1px solid ${C.amber}44`,borderRadius:8,overflow:"hidden"}}>
    <div style={{background:"#0a0d14",borderBottom:`1px solid ${C.amber}30`,padding:"10px 16px",
      display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:C.amber,display:"inline-block",
          boxShadow:`0 0 6px ${C.amber}`}}/>
        <span style={{fontSize:9,letterSpacing:".14em",color:C.amber,fontWeight:700,
          textTransform:"uppercase"}}>Level 3 — AI Draft Scenarios Pending Review</span>
      </div>
      <span style={{fontSize:8,color:C.dim,background:"#1a2235",padding:"2px 8px",borderRadius:3}}>
        {pending.length} draft{pending.length!==1?"s":""} awaiting approval
      </span>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
      {/* Left: draft list */}
      <div style={{borderRight:`1px solid ${C.border}`,padding:12,display:"flex",flexDirection:"column",gap:8}}>
        {pending.map(d=>{
          const sc=sevCol[d.sev]||C.accent;
          return <div key={d.id} onClick={()=>setSel(sel?.id===d.id?null:d)}
            style={{...card(),cursor:"pointer",padding:12,
              border:`1px solid ${sel?.id===d.id?sc:C.border}`,
              background:sel?.id===d.id?`${sc}08`:C.card}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:8,color:sc,fontWeight:700,background:`${sc}22`,
                padding:"1px 6px",borderRadius:3}}>{d.sev}</span>
              <span style={{fontSize:8,color:C.dim}}>{d.id}</span>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:LIGHT,marginBottom:4}}>{d.name}</div>
            <div style={{fontSize:9,color:C.dim,marginBottom:6,lineHeight:1.4}}>{d.desc?.slice(0,100)}...</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {(d.ttps||[]).slice(0,4).map(t=><span key={t} style={{fontSize:7,background:"#1a2235",
                color:C.accent,padding:"1px 5px",borderRadius:2,fontFamily:"monospace"}}>{t}</span>)}
            </div>
            <div style={{marginTop:6,fontSize:8,color:C.muted}}>
              Actor: {d.actor}  |  Confidence: {d.confidence?Math.round(d.confidence*100)+"%":"—"}
            </div>
          </div>;
        })}
      </div>

      {/* Right: detail + actions */}
      <div style={{padding:16}}>
        {!sel?<div style={{color:C.dim,fontSize:10,textAlign:"center",marginTop:40,padding:20}}>
          Select a draft scenario to review and approve
        </div>:<div style={{display:"flex",flexDirection:"column",gap:12}}>

          <div>
            <div style={{fontSize:13,fontWeight:700,color:LIGHT,marginBottom:4}}>{sel.name}</div>
            <div style={{fontSize:9,color:C.dim,lineHeight:1.6,marginBottom:8}}>{sel.desc}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              <span style={{fontSize:8,background:`${C.accent}18`,color:C.accent,
                padding:"2px 8px",borderRadius:3}}>{sel.cat}</span>
              <span style={{fontSize:8,background:`${C.amber}18`,color:C.amber,
                padding:"2px 8px",borderRadius:3}}>Actor: {sel.actor}</span>
              <span style={{fontSize:8,background:`${C.purple}18`,color:C.purple,
                padding:"2px 8px",borderRadius:3}}>{sel.dur}</span>
            </div>
          </div>

          {/* Kill chain phases */}
          <div>
            <div style={{fontSize:8,color:C.dim,letterSpacing:".1em",marginBottom:6,textTransform:"uppercase"}}>
              Kill Chain
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {(sel.chain||[]).map((ph,i)=><span key={i} style={{fontSize:8,
                background:(ph.col||C.accent)+"18",color:ph.col||C.accent,
                padding:"2px 8px",borderRadius:3,border:`1px solid ${ph.col||C.accent}30`}}>{ph.ph}</span>)}
            </div>
          </div>

          {/* TTPs */}
          <div>
            <div style={{fontSize:8,color:C.dim,letterSpacing:".1em",marginBottom:6,textTransform:"uppercase"}}>
              ATT&CK Techniques ({(sel.ttps||[]).length})
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {(sel.ttps||[]).map(t=><span key={t} style={{fontSize:7,background:"#1a2235",
                color:C.accent,padding:"1px 5px",borderRadius:2,fontFamily:"monospace"}}>{t}</span>)}
            </div>
          </div>

          {/* Confidence */}
          {sel.confidence&&<div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:8,color:C.dim,letterSpacing:".1em",textTransform:"uppercase"}}>
                ATT&CK Mapping Confidence
              </span>
              <span style={{fontSize:10,fontWeight:700,
                color:sel.confidence>=0.8?C.green:sel.confidence>=0.6?C.amber:C.red}}>
                {Math.round(sel.confidence*100)}%
              </span>
            </div>
            <div style={{height:4,background:C.muted+"55",borderRadius:2}}>
              <div style={{height:"100%",width:`${sel.confidence*100}%`,borderRadius:2,
                background:sel.confidence>=0.8?C.green:sel.confidence>=0.6?C.amber:C.red,
                transition:"width .5s ease"}}/>
            </div>
          </div>}

          {/* Source */}
          {sel.source_url&&<div>
            <a href={sel.source_url} target="_blank" rel="noopener"
              style={{fontSize:9,color:C.accent,textDecoration:"none"}}>
              → View source intelligence report
            </a>
          </div>}

          {/* Action buttons */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button
              onClick={()=>{setApproved(p=>[...p,sel.id]);setSel(null);}}
              style={{flex:1,background:C.green+"22",color:C.green,
                border:`1px solid ${C.green}60`,borderRadius:4,padding:"8px 12px",
                fontSize:10,cursor:"pointer",fontWeight:700}}>
              ✓ Approve Scenario
            </button>
            <button
              onClick={()=>copyJSON(sel)}
              style={{background:C.purple+"22",color:C.purple,
                border:`1px solid ${C.purple}60`,borderRadius:4,padding:"8px 12px",
                fontSize:10,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>
              {copied?"✓ Copied":"{} Copy JSON"}
            </button>
          </div>
          <div style={{fontSize:8,color:C.dim,lineHeight:1.5}}>
            Approving adds this scenario to the active simulation library for this session.
            Copy JSON to permanently add it to the SCENARIOS array in the simulation file.
          </div>
        </div>}
      </div>
    </div>
    <ScenarioDraftPanel/>
  </div>;
}

    splunk:`index=kubernetes sourcetype=kube:apiserver verb IN ("get","list") resource="secrets"
| where user.username NOT IN (known_service_accounts)
| stats count by user.username, sourceIPs{}, resource`,
    sentinel:`KubeAuditAdminLogs
| where Verb in ("get","list")
| where ObjectRef_Resource == "secrets"
| where User_Username !in (known_service_accounts)
| summarize count() by User_Username, SourceIps, ObjectRef_Namespace`
  },
  "T1553.002": {
    name:"Code Signing Bypass",tactic:"Defense Evasion",
    splunk:`index=windows EventCode=4688
| where Signature="Microsoft Corporation" AND Image NOT LIKE "C:\Windows\%"
| stats count by host, Image, Signature, CommandLine`,
    sentinel:`SecurityEvent
| where EventID == 4688
| where Signature == "Microsoft Corporation"
| where NewProcessName !startswith "C:\Windows\"
| summarize count() by Computer, NewProcessName, CommandLine`
  },
  "T1558.003": {
    name:"Kerberoasting",tactic:"Credential Access",
    splunk:`index=windows EventCode=4769 TicketEncryptionType="0x17"
| where ServiceName!="krbtgt" AND ServiceName NOT LIKE "%$"
| stats count by ServiceName, ClientAddress, host
| where count > 3`,
    sentinel:`SecurityEvent
| where EventID == 4769
| where TicketEncryptionType == "0x17"
| where ServiceName != "krbtgt" and ServiceName !endswith "$"
| summarize count() by ServiceName, IpAddress, Computer
| where count_ > 3`
  },
  "T1560.001": {
    name:"Archive Collected Data",tactic:"Collection",
    splunk:`index=windows EventCode=4688
| where CommandLine LIKE "%7z%" OR CommandLine LIKE "%WinRAR%" OR CommandLine LIKE "%-p %"
| where CommandLine LIKE "%-mhe%" OR CommandLine LIKE "%-hp%"
| stats count by host, User, CommandLine`,
    sentinel:`SecurityEvent
| where EventID == 4688
| where CommandLine contains "7z" or CommandLine contains "WinRAR"
| where CommandLine contains "-p " or CommandLine contains "-hp" or CommandLine contains "-mhe"
| summarize count() by Computer, Account, CommandLine`
  },
  "T1562.001": {
    name:"Disable or Modify Security Tools",tactic:"Defense Evasion",
    splunk:`index=windows EventCode IN (7045,4688)
| where CommandLine LIKE "%Set-MpPreference%DisableRealtimeMonitoring%" OR CommandLine LIKE "%Stop-Service%windefend%"
| stats count by host, User, CommandLine`,
    sentinel:`SecurityEvent
| where EventID in (7045, 4688)
| where CommandLine contains "DisableRealtimeMonitoring" or CommandLine contains "Stop-Service" and CommandLine contains "windefend"
| summarize count() by Computer, Account, CommandLine`
  },
  "T1562.004": {
    name:"Disable or Modify System Firewall",tactic:"Defense Evasion",
    splunk:`index=windows EventCode=4688
| where CommandLine LIKE "%netsh advfirewall set allprofiles state off%" OR CommandLine LIKE "%Set-NetFirewallProfile%Disabled%"
| stats count by host, User, CommandLine`,
    sentinel:`SecurityEvent
| where EventID == 4688
| where CommandLine contains "advfirewall set allprofiles state off" or CommandLine contains "Set-NetFirewallProfile" and CommandLine contains "Disabled"
| summarize count() by Computer, Account, CommandLine`
  },
  "T1562.008": {
    name:"Disable Cloud Logs",tactic:"Defense Evasion",
    splunk:`index=azure operationName IN ("Delete diagnostic setting","Delete activity log profile")
| stats count by userPrincipalName, ipAddress, operationName`,
    sentinel:`AuditLogs
| where OperationName in ("Delete diagnostic setting","Delete activity log profile")
| extend Actor = tostring(InitiatedBy.user.userPrincipalName)
| summarize count() by Actor, IPAddress, OperationName`
  },
  "T1566.001": {
    name:"Spearphishing Attachment",tactic:"Initial Access",
    splunk:`index=email (attachment_type IN ("application/vnd.ms-excel","application/msword","application/pdf"))
| where subject LIKE "%invoice%" OR subject LIKE "%payment%" OR subject LIKE "%urgent%"
| stats count by sender, recipient, attachment_name`,
    sentinel:`EmailEvents
| where AttachmentCount > 0
| where FileType in ("xls","xlsx","doc","docx","pdf")
| where Subject contains "invoice" or Subject contains "payment" or Subject contains "urgent"
| summarize count() by SenderFromAddress, RecipientEmailAddress, FileName`
  },
  "T1566.002": {
    name:"Spearphishing Link",tactic:"Initial Access",
    splunk:`index=email url LIKE "http://*" AND url NOT IN (known_safe_domains)
| stats count by sender, recipient, url
| where count > 3`,
    sentinel:`EmailEvents
| where Urls contains "http://"
| where not(Urls has_any (known_safe_domains))
| summarize count() by SenderFromAddress, RecipientEmailAddress, Urls`
  },
  "T1567.001": {
    name:"Exfiltration to Code Repository",tactic:"Exfiltration",
    splunk:`index=proxy dest IN ("github.com","gitlab.com","bitbucket.org") method=POST bytes_out > 1000000
| stats sum(bytes_out) as total by src_ip, dest, uri_path
| where total > 10000000`,
    sentinel:`CommonSecurityLog
| where DestinationHostName in ("github.com","gitlab.com","bitbucket.org")
| where RequestMethod == "POST"
| where SentBytes > 1000000
| summarize Total=sum(SentBytes) by SourceIP, DestinationHostName, RequestURL
| where Total > 10000000`
  },
  "T1567.002": {
    name:"Exfiltration to Cloud Storage",tactic:"Exfiltration",
    splunk:`index=proxy dest IN ("drive.google.com","onedrive.live.com","dropbox.com") method=POST bytes_out > 5000000
| stats sum(bytes_out) as total by src_ip, dest
| where total > 50000000`,
    sentinel:`CommonSecurityLog
| where DestinationHostName in ("drive.google.com","onedrive.live.com","dropbox.com")
| where RequestMethod == "POST"
| where SentBytes > 5000000
| summarize Total=sum(SentBytes) by SourceIP, DestinationHostName
| where Total > 50000000`
  },
  "T1570": {
    name:"Lateral Tool Transfer",tactic:"Lateral Movement",
    splunk:`index=windows EventCode=5145 ShareName="\\*\ADMIN$"
| where RelativeTargetName LIKE "%.exe" OR RelativeTargetName LIKE "%.ps1" OR RelativeTargetName LIKE "%.dll"
| stats count by SubjectUserName, IpAddress, RelativeTargetName, host`,
    sentinel:`SecurityEvent
| where EventID == 5145
| where ShareName contains "ADMIN$"
| where RelativeTargetName endswith ".exe" or RelativeTargetName endswith ".ps1" or RelativeTargetName endswith ".dll"
| summarize count() by Account, IpAddress, RelativeTargetName, Computer`
  },
  "T1574.001": {
    name:"DLL Search Order Hijacking",tactic:"Persistence",
    splunk:`index=windows EventCode=4688
| where Image LIKE "%.dll" AND NOT Image LIKE "C:\Windows\System32\%"
| where ParentImage IN ("explorer.exe","services.exe")
| stats count by host, Image, ParentImage`,
    sentinel:`SecurityEvent
| where EventID == 4688
| where NewProcessName endswith ".dll"
| where NewProcessName !startswith "C:\Windows\System32\"
| summarize count() by Computer, NewProcessName, ParentProcessName`
  },
  "T1592.002": {
    name:"Gather Host Software Information",tactic:"Reconnaissance",
    splunk:`index=web uri_path IN ("/robots.txt","/.git/config","/.env","//phpinfo.php")
| stats count by src_ip, uri_path, status`,
    sentinel:`W3CIISLog
| where csUriStem in ("/robots.txt","/.git/config","/.env","/phpinfo.php")
| summarize count() by cIP, csUriStem, scStatus`
  },
  "T1595.002": {
    name:"Vulnerability Scanning",tactic:"Reconnaissance",
    splunk:`index=network dest_port IN (80,443,8080,8443)
| stats dc(dest_port) as ports_scanned, count by src_ip
| where ports_scanned > 10 AND count > 100`,
    sentinel:`CommonSecurityLog
| where DestinationPort in (80, 443, 8080, 8443)
| summarize PortsScanned=dcount(DestinationPort), Requests=count() by SourceIP
| where PortsScanned > 10 and Requests > 100`
  },
  "T1610": {
    name:"Deploy Container",tactic:"Execution",
    splunk:`index=container action=create
| where src_ip NOT IN (known_orchestrator_ips)
| stats count by src_ip, image_name, container_id`,
    sentinel:`ContainerInstanceLog
| where OperationName == "Create/Update Container Group"
| where CallerIpAddress !in (known_orchestrator_ips)
| summarize count() by CallerIpAddress, ContainerGroupName, Image`
  },
  "T1611": {
    name:"Escape to Host",tactic:"Privilege Escalation",
    splunk:`index=container
| where message LIKE "%privileged%" OR message LIKE "%nsenter%" OR message LIKE "%--pid=host%"
| stats count by host, container_id, message`,
    sentinel:`ContainerInstanceLog
| where OperationName contains "privileged" or Properties contains "nsenter" or Properties contains "--pid=host"
| summarize count() by Computer, ContainerGroupName, Properties`
  },
  "T1613": {
    name:"Container and Resource Discovery",tactic:"Discovery",
    splunk:`index=kubernetes sourcetype=kube:apiserver verb IN ("list","get") resource IN ("pods","services","secrets","configmaps")
| stats count by user.username, resource, namespace
| where count > 50`,
    sentinel:`KubeAuditAdminLogs
| where Verb in ("list","get")
| where ObjectRef_Resource in ("pods","services","secrets","configmaps")
| summarize count() by User_Username, ObjectRef_Resource, ObjectRef_Namespace
| where count_ > 50`
  }
};

const RULE_SCENARIOS = {};
SCENARIOS.forEach(sc => {
  sc.ttps.forEach(t => {
    if (!RULE_SCENARIOS[t]) RULE_SCENARIOS[t] = [];
    if (!RULE_SCENARIOS[t].includes(sc.id)) RULE_SCENARIOS[t].push(sc.id);
  });
});



function useDetectionRules(){
  const [liveRules,setLiveRules]=useState({});
  useEffect(()=>{
    fetch('/breachforge/intel/data/detection_rules.json?v='+Date.now())
      .then(r=>r.json())
      .then(d=>{
        if(d.rules&&Object.keys(d.rules).length>0){
          setLiveRules(d.rules);
          console.log('Detection rules: '+Object.keys(d.rules).length+' live rules loaded from TI pipeline');
        }
      })
      .catch(()=>{});
  },[]);
  // Merge live rules (from Phase 3 API) with embedded rules — live rules take priority
  return {...DETECTION_RULES,...liveRules};
}

function DetectionRulesPage(){
  const [activeScenario,setActiveScenario]=useState("all");
  const [activeTactic,setActiveTactic]=useState("all");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [copied,setCopied]=useState(null);

  const TACTICS=["all","Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Credential Access","Discovery","Lateral Movement","Collection","Exfiltration","Impact","Reconnaissance"];

  const allRules=useDetectionRules();
  const filtered=Object.entries(allRules).filter(([tid,rule])=>{
    if(activeScenario!=="all" && !( RULE_SCENARIOS[tid]||[]).includes(activeScenario)) return false;
    if(activeTactic!=="all" && rule.tactic!==activeTactic) return false;
    if(search && !tid.toLowerCase().includes(search.toLowerCase()) && !rule.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  function copy(text,id){
    navigator.clipboard.writeText(text).then(()=>{setCopied(id);setTimeout(()=>setCopied(null),2000);});
  }

  const tacticCol={
    "Initial Access":C.amber,"Execution":C.orange,"Persistence":C.pink,
    "Privilege Escalation":C.red,"Defense Evasion":C.purple,"Credential Access":C.red,
    "Discovery":C.cyan,"Lateral Movement":C.accent,"Collection":C.green,
    "Exfiltration":C.red,"Impact":C.red,"Reconnaissance":C.dim
  };

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>

    {/* Header stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        ["Total Rules",Object.keys(allRules).length,C.accent],
        ["Splunk SPL",Object.keys(DETECTION_RULES).length,C.orange],
        ["Sentinel KQL",Object.keys(DETECTION_RULES).length,C.purple],
        ["Scenarios Covered","S1-S10",C.green],
      ].map(([l,v,c])=><div key={l} style={card()}>
        <div style={{fontSize:8,letterSpacing:".12em",color:C.dim,marginBottom:6,textTransform:"uppercase"}}>{l}</div>
        <div style={{fontSize:28,fontWeight:700,color:c}}>{v}</div>
      </div>)}
    </div>

    {/* Filters */}
    <div style={{...card(),display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Search technique ID or name..."
        style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,
          padding:"6px 12px",borderRadius:4,fontSize:11,fontFamily:"inherit",
          width:220,outline:"none"}}/>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {["all","S1","S2","S3","S4","S5","S6","S7","S8","S9","S10"].map(s=>(
          <button key={s} onClick={()=>setActiveScenario(s)}
            style={{...BTN(activeScenario===s?C.accent:C.dim,activeScenario!==s),
              padding:"4px 10px",fontSize:9}}>
            {s==="all"?"All Scenarios":s}
          </button>
        ))}
      </div>
      <select value={activeTactic} onChange={e=>setActiveTactic(e.target.value)}
        style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,
          padding:"5px 10px",borderRadius:4,fontSize:11,fontFamily:"inherit",outline:"none"}}>
        {TACTICS.map(t=><option key={t} value={t}>{t==="all"?"All Tactics":t}</option>)}
      </select>
      <span style={{fontSize:9,color:C.dim,marginLeft:"auto"}}>{filtered.length} rules</span>
    </div>

    {/* Rules grid + detail panel */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,minHeight:400}}>

      {/* Left: rule list */}
      <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:700,overflowY:"auto"}}>
        {filtered.map(([tid,rule])=>{
          const tc=tacticCol[rule.tactic]||C.dim;
          const scenarios=RULE_SCENARIOS[tid]||[];
          return <div key={tid} onClick={()=>setSel(sel===tid?null:tid)}
            style={{...card({padding:12,cursor:"pointer"}),
              border:`1px solid ${sel===tid?C.accent:C.border}`,
              background:sel===tid?`${C.accent}08`:C.card}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:10,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>{tid}</span>
              <span style={{fontSize:8,color:tc,background:`${tc}18`,padding:"1px 6px",borderRadius:3}}>{rule.tactic}</span>
            </div>
            <div style={{fontSize:11,fontWeight:600,color:C.text,marginBottom:5}}>{rule.name}</div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {scenarios.map(s=><span key={s} style={{fontSize:7,background:`${C.accent}18`,
                color:C.accent,padding:"1px 5px",borderRadius:2}}>{s}</span>)}
              <span style={{fontSize:7,color:C.muted,marginLeft:"auto"}}>SPL + KQL</span>
            </div>
          </div>;
        })}
        {filtered.length===0&&<div style={{padding:24,color:C.dim,fontSize:11,textAlign:"center"}}>
          No rules match current filters
        </div>}
      </div>

      {/* Right: rule detail */}
      <div style={{...card(),padding:0,overflow:"hidden",height:"fit-content",position:"sticky",top:0}}>
        {!sel?<div style={{padding:24,color:C.dim,fontSize:10,textAlign:"center",marginTop:40}}>
          Select a technique to see detection rules
        </div>:<div>
          {(()=>{
            const rule=allRules[sel];
            if(!rule)return null;
            const tc=tacticCol[rule.tactic]||C.dim;
            const scenarios=RULE_SCENARIOS[sel]||[];
            return <>
              <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,
                background:`${C.accent}06`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <span style={{fontSize:14,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>{sel}</span>
                  <span style={{fontSize:8,color:tc,background:`${tc}18`,padding:"2px 8px",borderRadius:3}}>{rule.tactic}</span>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:6}}>{rule.name}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {scenarios.map(s=><span key={s} style={{fontSize:8,background:`${C.accent}18`,
                    color:C.accent,padding:"2px 7px",borderRadius:3}}>Used in {s}</span>)}
                </div>
              </div>

              {/* Splunk SPL */}
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:9,fontWeight:700,color:C.orange,letterSpacing:".1em"}}>SPLUNK SPL</span>
                  </div>
                  <button onClick={()=>copy(rule.splunk,"splunk-"+sel)}
                    style={{...BTN(copied==="splunk-"+sel?C.green:C.orange,true),padding:"3px 10px",fontSize:8}}>
                    {copied==="splunk-"+sel?"✓ Copied":"Copy SPL"}
                  </button>
                </div>
                <pre style={{background:"#040710",border:`1px solid ${C.border}`,borderRadius:4,
                  padding:"10px 12px",fontSize:9,color:C.green,lineHeight:1.7,
                  overflowX:"auto",margin:0,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                  {rule.splunk}
                </pre>
              </div>

              {/* Sentinel KQL */}
              <div style={{padding:"12px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:9,fontWeight:700,color:C.purple,letterSpacing:".1em"}}>MICROSOFT SENTINEL KQL</span>
                  </div>
                  <button onClick={()=>copy(rule.sentinel,"sentinel-"+sel)}
                    style={{...BTN(copied==="sentinel-"+sel?C.green:C.purple,true),padding:"3px 10px",fontSize:8}}>
                    {copied==="sentinel-"+sel?"✓ Copied":"Copy KQL"}
                  </button>
                </div>
                <pre style={{background:"#040710",border:`1px solid ${C.border}`,borderRadius:4,
                  padding:"10px 12px",fontSize:9,color:C.purple,lineHeight:1.7,
                  overflowX:"auto",margin:0,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                  {rule.sentinel}
                </pre>
              </div>
            </>;
          })()}
        </div>}
      </div>
    </div>
  </div>;
}

// ── TI Navigation bridge ─────────────────────────────────────────────────────
const _nav={setPage:null,setPick:null};
function tiRunScenario(id){
  const sc=SCENARIOS.find(s=>s.id===id);
  if(sc&&_nav.setPick)_nav.setPick(sc);
  if(_nav.setPage)_nav.setPage("simulations");
}

function App(){
  const [onboarded,setOnboarded]=useState(false);
  const [page,setPage]=useState("overview");
  const [role,setRole]=useState("CISO / CIO");
  const [time,setTime]=useState(new Date());
  const [tiPick,setTiPick]=useState(null);
  useEffect(()=>{_nav.setPage=setPage;_nav.setPick=setTiPick;},[]);
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);
  if(!onboarded)return <Onboarding onDone={(selectedRole)=>{setRole(selectedRole||"CISO / CIO");setOnboarded(true);}}/>;
  const PAGES={overview:<Overview/>,emerging:<EmergingThreats/>,rules:<DetectionRulesPage/>,simulations:<SimRunner tiPick={tiPick} clearTiPick={()=>setTiPick(null)}/>,killchain:<KillChainPage/>,mitre:<MitrePage/>,actors:<ActorLibrary/>,compliance:<CompliancePage/>,agents:<AgentsPage/>,reports:<ReportsPage role={role}/>,settings:<SettingsPage/>};
  return <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    <div style={{width:200,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
      <div style={{padding:"20px 16px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:C.accent,letterSpacing:".1em",display:"flex",alignItems:"center",gap:8}}><span style={{width:8,height:8,background:C.accent,borderRadius:"50%",display:"inline-block",boxShadow:`0 0 8px ${C.accent}`}}/>BREACHFORGE</div>
        <div style={{fontSize:8,color:C.muted,marginTop:3,letterSpacing:".08em"}}>BAS PLATFORM v4.0</div>
      </div>
      <nav style={{padding:"12px 8px",flex:1}}>
        {NAV.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",padding:"9px 10px",borderRadius:5,marginBottom:2,background:page===n.id?`${C.accent}14`:"transparent",border:`1px solid ${page===n.id?C.accent+"44":"transparent"}`,color:page===n.id?C.accent:C.dim,fontSize:11,letterSpacing:".04em"}}><span style={{fontSize:13,width:18,textAlign:"center"}}>{n.icon}</span>{n.label}</button>)}
      </nav>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><span style={{width:6,height:6,background:C.green,borderRadius:"50%",animation:"pulse 2s infinite",display:"inline-block"}}/><span style={{fontSize:9,color:C.green}}>LIVE</span></div>
        <div style={{fontSize:9,color:C.dim,fontVariantNumeric:"tabular-nums"}}>{time.toLocaleTimeString("en-GB")}</div>
        <div style={{fontSize:8,color:C.muted,marginTop:2}}>Lab env · synthetic only</div>
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}><a href="../" style={{fontSize:9,color:C.dim,textDecoration:"none"}}>← Back</a></div>
      </div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800}}>{NAV.find(n=>n.id===page)?.label}</div><div style={{fontSize:9,color:C.dim,marginTop:1}}>{role} · BreachForge v4.0 · Lab environment · synthetic telemetry only</div></div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:8,color:C.muted,marginRight:4,letterSpacing:".1em"}}>ROLE:</span>{ROLES.map(r=><button key={r} onClick={()=>setRole(r)} style={{background:role===r?"#1c2a3a":"transparent",border:`1px solid ${role===r?C.accent+"55":C.border}`,color:role===r?C.text:C.dim,padding:"4px 10px",borderRadius:3,fontSize:9}}>{r}</button>)}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:20}}><div className="fadein">{PAGES[page]||<Overview/>}</div></div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
