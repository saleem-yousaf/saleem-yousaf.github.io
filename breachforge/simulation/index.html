<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreachForge BAS</title>
<meta name="description" content="BreachForge BAS platform. Opens the full desktop experience by default; flip to the mobile view from inside either app.">
<link rel="canonical" href="https://saleemyousaf.co.uk/breachforge/simulation/">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#07090d;color:#dde4ef;font-family:'DM Mono',ui-monospace,Menlo,monospace;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px;box-sizing:border-box;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#00d4ff;letter-spacing:.02em;display:flex;align-items:center;gap:9px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#00d4ff;box-shadow:0 0 10px #00d4ff;}
  .sub{font-size:11px;color:#55677a;}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
  a.btn{font-size:12px;color:#00d4ff;text-decoration:none;border:1px solid rgba(0,212,255,0.35);border-radius:6px;padding:9px 16px;}
  a.btn.alt{color:#55677a;border-color:#1c2535;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span class="dot"></span>BREACHFORGE</div>
  <div class="sub">Opening the platform...</div>
  <div class="row" id="choice" style="display:none">
    <a class="btn" href="./desktop/">Full desktop</a>
    <a class="btn alt" href="./mobile/">Mobile view</a>
  </div>
</div>
<script>
  // Default experience is the full desktop app. If the visitor previously chose
  // mobile (set by the flip links inside either app), honour that choice.
  (function(){
    var dest = "./desktop/";
    try { if (localStorage.getItem("bf_view") === "mobile") dest = "./mobile/"; } catch (e) {}
    // If the redirect is blocked for any reason, reveal a manual chooser.
    setTimeout(function(){ var c = document.getElementById("choice"); if (c) c.style.display = "flex"; }, 1200);
    location.replace(dest);
  })();
</script>
<noscript>
  <div style="text-align:center;margin-top:28px;">
    <a href="./desktop/" style="color:#00d4ff;">Full desktop</a>
    &nbsp;&middot;&nbsp;
    <a href="./mobile/" style="color:#55677a;">Mobile view</a>
  </div>
</noscript>
</body>
</html>
