<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Title with name for SEO during transition -->
<title>BreachForge has moved · Saleem Yousaf</title>

<!-- Meta refresh (works without JS) -->
<meta http-equiv="refresh" content="0; url=https://breachforge.co.uk/">

<!-- Canonical to the new home -->
<link rel="canonical" href="https://breachforge.co.uk/">

<!-- Tell crawlers this page should not be indexed; the destination should be -->
<meta name="robots" content="noindex, follow">

<!-- Description that still mentions Saleem to preserve any name signal -->
<meta name="description" content="BreachForge has moved to breachforge.co.uk. Built and maintained by Saleem Yousaf, Cloud and Cyber Security Architect. Redirecting now.">

<!-- Open Graph for any social shares of old URLs -->
<meta property="og:title" content="BreachForge has moved to breachforge.co.uk">
<meta property="og:description" content="The BreachForge platform now lives at breachforge.co.uk. Redirecting.">
<meta property="og:url" content="https://breachforge.co.uk/">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #090c10;
    color: #e6eaf0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    line-height: 1.6;
  }
  .wrap { max-width: 480px; }
  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #e63946;
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.3);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: -0.5px;
  }
  p {
    color: #7a8694;
    font-size: 15px;
    margin-bottom: 22px;
  }
  a.cta {
    display: inline-block;
    background: #e63946;
    color: #fff;
    padding: 12px 26px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    margin-bottom: 18px;
  }
  a.cta:hover { opacity: 0.9; }
  .fineprint {
    font-size: 12px;
    color: #4a5568;
  }
  .fineprint a { color: #2dd4bf; text-decoration: none; }
</style>

<!-- JS fallback redirect for browsers that ignore meta-refresh -->
<script>
  // Hard redirect after 0ms; gives users with JS enabled the fastest hop
  window.location.replace('https://breachforge.co.uk/');
</script>
</head>
<body>
  <div class="wrap">
    <div class="badge">⬡ Redirecting</div>
    <h1>BreachForge has moved.</h1>
    <p>The BreachForge platform now lives at its own domain.<br>You'll be redirected automatically in a moment.</p>
    <a href="https://breachforge.co.uk/" class="cta">Go to breachforge.co.uk →</a>
    <p class="fineprint">
      Built and maintained by <a href="https://saleemyousaf.co.uk/">Saleem Yousaf</a>.
      Part of the <a href="https://www.cyberspartans.co.uk/">Cyber Spartans</a> practice.
    </p>
  </div>
</body>
</html>
